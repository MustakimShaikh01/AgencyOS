<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgencyOS Dashboard | Standard Workspace</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">

    <!-- Heavy Hitters -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <link rel="stylesheet" href="/static/css/game.css">
</head>

<body>

    <!-- Professional Loader -->
    <div id="global-loader" class="loader-shield">
        <div class="spinner-grid">
            <div style="animation-delay: 0s"></div>
            <div style="animation-delay: 0.1s"></div>
            <div style="animation-delay: 0.2s"></div>
            <div style="animation-delay: 0.1s"></div>
            <div style="animation-delay: 0.2s"></div>
            <div style="animation-delay: 0.3s"></div>
            <div style="animation-delay: 0.2s"></div>
            <div style="animation-delay: 0.3s"></div>
            <div style="animation-delay: 0.4s"></div>
        </div>
        <div class="loader-text"
            style="color: #fff; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; font-size: 0.7rem;">
            Syncing Infrastructure</div>
    </div>

    <div class="app-container">
        <header class="primary-header">
            <div class="brand-section">
                <h1>Agency<span>OS</span></h1>
            </div>

            <nav class="nav-hub">
                <a href="/" class="nav-link">Hub</a>
                <a href="/about.html" class="nav-link">Intel</a>
                <a href="/contact.html" class="nav-link">Network</a>
                <div style="width: 1px; height: 16px; background: var(--border-subtle); margin: 0 10px;"></div>
                <button class="nav-link" style="border:none; background:none; cursor:pointer;"
                    onclick="engine.toggleLights()">💡 Lights</button>
                <div style="width: 1px; height: 16px; background: var(--border-subtle); margin: 0 10px;"></div>
                <button class="nav-link" style="border:none; background:none; cursor:pointer;"
                    onclick="loadCompanyDrive()">Data Drive</button>
                <button class="primary-btn" style="padding: 8px 20px; font-size: 0.75rem; margin-left: 10px;"
                    onclick="document.getElementById('campaign-modal').classList.add('active')">
                    Deploy AI
                </button>
            </nav>
        </header>

        <main class="dashboard-main">
            <!-- Left HUD: Control and Analytics -->
            <aside class="hud-control-panel">
                <div class="hud-scroll-area">

                    <div class="hud-section">
                        <div class="section-label">Operations Health</div>
                        <div class="kpi-grid">
                            <div class="kpi-card">
                                <span class="val" id="kpi-campaigns">0</span>
                                <span class="lab">Active Drives</span>
                            </div>
                            <div class="kpi-card">
                                <span class="val" id="kpi-spend">$0.00</span>
                                <span class="lab">Resource Burn</span>
                            </div>
                        </div>
                    </div>

                    <div class="hud-section">
                        <div class="section-label">System Meta-States</div>

                        <div class="stat-item">
                            <div class="stat-header">
                                <span>Core Logic Pulse</span>
                                <span id="logic-percent" class="pulse-yellow">92%</span>
                            </div>
                            <div class="meter-outer">
                                <div class="meter-inner" style="width: 92%"></div>
                            </div>
                        </div>

                        <div class="stat-item">
                            <div class="stat-header">
                                <span>LLM Sync Rate</span>
                                <span id="llm-percent" class="pulse-purple">100%</span>
                            </div>
                            <div class="meter-outer">
                                <div class="meter-inner"
                                    style="width: 100%; background: var(--brand-accent); box-shadow: 0 0 10px var(--brand-accent);">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="hud-section">
                        <div class="section-label">Intelligence Stream</div>
                        <div class="intelligence-log" id="hud-log">
                            <!-- Streamed content -->
                        </div>
                    </div>

                </div>
            </aside>

            <!-- 3D Environment -->
            <section class="view-port-3d">
                <div id="canvas-container" style="width: 100%; height: 100%;"></div>
                <div id="ui-overlay"></div>
            </section>
        </main>
    </div>

    <!-- Modals -->
    <div id="campaign-modal" class="modal-shield">
        <div class="modal-body">
            <div class="modal-header">
                <h2>Initialize AI Fleet</h2>
                <button class="close-btn"
                    onclick="document.getElementById('campaign-modal').classList.remove('active')">&times;</button>
            </div>
            <form id="campaign-form">
                <div class="form-input-group">
                    <label>Enterprise Vector (Project Name)</label>
                    <input type="text" id="cp_name" placeholder="Quantum Nexus Expansion" required>
                </div>
                <div class="form-input-group">
                    <label>Autonomous Persona Guidelines</label>
                    <textarea id="cp_guidelines" rows="4"
                        placeholder="Aggressive market penetration, sleek aesthetic consistency..."></textarea>
                </div>
                <div class="form-input-group">
                    <label>Budget Allocation ($)</label>
                    <input type="number" id="cp_budget" value="1200">
                </div>
                <button type="submit" class="primary-btn" style="width: 100%">Initialize Deployment</button>
            </form>
        </div>
    </div>

    <!-- Drive Modal -->
    <div id="drive-modal" class="modal-shield">
        <div class="modal-body" style="max-width: 900px;">
            <div class="modal-header">
                <h2>Corporate Intelligence Drive</h2>
                <button class="close-btn"
                    onclick="document.getElementById('drive-modal').classList.remove('active')">&times;</button>
            </div>
            <div id="drive-contents" style="max-height: 60vh; overflow-y: auto; padding-right: 10px;">
                <!-- Drive data -->
            </div>
        </div>
    </div>

    <div id="toast-container"
        style="position: fixed; bottom: 30px; right: 30px; z-index: 9999; display: flex; flex-direction: column; gap: 10px;">
    </div>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/websocket.js"></script>
    <script src="/static/js/game.js"></script>
</body>

</html>
