<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact AgencyOS | Get in Touch with the Future</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="/static/css/main.css">
    <style>
        :root {
            --primary: #c5a059;
            --secondary: #6c63ff;
            --bg: #06080e;
            --text: #f0f0f5;
            --text-muted: #8b92a5;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --green: #10b981;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding-top: 100px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px;
            text-align: center;
        }

        h2 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 20px;
            color: var(--green);
        }

        p {
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--text-muted);
            margin-bottom: 50px;
        }

        .contact-form {
            background: var(--glass);
            padding: 60px;
            border-radius: 30px;
            border: 1px solid var(--border);
            text-align: left;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        input,
        textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 12px;
            color: white;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            transition: all 0.3s;
            box-sizing: border-box;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px rgba(77, 121, 255, 0.2);
        }

        .submit-btn {
            background: var(--green);
            color: #000;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: 800;
            border: none;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        .submit-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(0, 255, 157, 0.3);
        }

        .nav-header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            z-index: 100;
            background: rgba(10, 10, 12, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
        }

        .nav-brand {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
        }

        .nav-links {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .nav-links a.linkedin {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #0077b5;
        }

        .cta-btn {
            background: var(--primary);
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>

<body>

    <nav class="nav-header">
        <div class="nav-brand">AGENCY<span>OS</span></div>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/about.html">About</a>
            <a href="/contact.html">Contact</a>
            <a href="https://linkedin.com" target="_blank" class="linkedin">
                <svg width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                    <path
                        d="M0 1.146C0 .513.526 0 1.175 0h13.65C15.474 0 16 .513 16 1.146v13.708c0 .633-.526 1.146-1.175 1.146H1.175C.526 16 0 15.487 0 14.854V1.146zm4.943 12.248V6.169H2.542v7.225h2.401zm-1.2-8.212c.837 0 1.358-.554 1.358-1.248-.015-.709-.52-1.248-1.342-1.248-.822 0-1.359.54-1.359 1.248 0 .694.521 1.248 1.327 1.248h.016zm4.908 8.212V9.359c0-.216.016-.432.08-.586.173-.431.568-.878 1.232-.878.869 0 1.216.662 1.216 1.634v3.865h2.401V9.25c0-2.22-1.184-3.252-2.764-3.252-1.274 0-1.845.7-2.165 1.193v.025h-.016a5.54 5.54 0 0 1 .016-.025V6.169h-2.4c.03.678 0 7.225 0 7.225h2.4z" />
                </svg>
                LinkedIn
            </a>
            <a href="/dashboard" class="cta-btn">Dashboard</a>
        </div>
    </nav>

    <div class="container">
        <h2>Connect with the Hivemind.</h2>
        <p>Whether you want to deploy a specialized AI fleet or integrate AgencyOS into your enterprise, we are ready to
            scale with you.</p>

        <form class="contact-form" onsubmit="event.preventDefault(); alert('Transmission Received by the Hivemind!');">
            <div class="form-group">
                <label>Company / Name</label>
                <input type="text" placeholder="Quantum Dynamics Inc." required>
            </div>
            <div class="form-group">
                <label>Autonomous Sector</label>
                <input type="text" placeholder="AI Infrastructure / Marketing" required>
            </div>
            <div class="form-group">
                <label>Message</label>
                <textarea rows="5" placeholder="How can we help scale your autonomous future?" required></textarea>
            </div>
            <button type="submit" class="submit-btn">Scale Now</button>
        </form>
    </div>

</body>

</html>
